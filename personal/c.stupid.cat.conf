map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ---- HTTP → HTTPS (canonical host) ----
server {
    listen 80;
    listen [::]:80;

    server_name c.stupid.cat clove.stupid.cat;

    return 301 https://c.stupid.cat$request_uri;
}

# ---- clove.stupid.cat (HTTPS) → canonical c.stupid.cat ----
server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name clove.stupid.cat;

    ssl_certificate     /etc/letsencrypt/live/stupid.cat/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stupid.cat/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://c.stupid.cat$request_uri;
}

# ---- c.stupid.cat (HTTPS) → Next.js app (Docker) on 127.0.0.1:5002 ----
server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name c.stupid.cat;

    ssl_certificate     /etc/letsencrypt/live/stupid.cat/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stupid.cat/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Small headroom for guestbook posts etc.
    client_max_body_size 10m;

    # ---- Compression ----
    # Next's standalone server does not compress; do it here. Big win for the
    # large hand-written scripts (core.js ~41KB, discord.js ~48KB) and CSS.
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_types        text/plain text/css application/javascript text/javascript
                      application/json image/svg+xml application/xml application/rss+xml;
    # If nginx was built with the brotli module, uncomment for even smaller JS/CSS:
    # brotli            on;
    # brotli_comp_level 5;
    # brotli_types      text/plain text/css application/javascript text/javascript
    #                   application/json image/svg+xml application/xml;

    # ---- Caching: Next's hashed build assets never change → cache hard ----
    location /_next/static/ {
        proxy_pass http://127.0.0.1:5002;
        proxy_set_header Host $host;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ---- Caching: images/fonts/etc. under /assets rarely change ----
    location /assets/ {
        proxy_pass http://127.0.0.1:5002;
        proxy_set_header Host $host;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=2592000"; # 30 days
    }

    # ---- Caching: the hand-written scripts + styles (no content hash in the
    # filename, so keep the TTL modest; hard-refresh or bump after a redeploy) ----
    location ~* ^/(js|css)/ {
        proxy_pass http://127.0.0.1:5002;
        proxy_set_header Host $host;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=86400"; # 1 day
    }

    location / {
        proxy_pass http://127.0.0.1:5002;

        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_read_timeout 60s;
    }
}
