<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Inbox</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <h1>Inbox</h1>
      <button id="composeBtn" class="btn-accent">New message</button>
    </header>

    <div class="layout">
      <aside id="list" class="list">
        <p class="muted">Loading…</p>
      </aside>

      <main id="detail" class="detail">
        <p class="muted">Select an email to read it.</p>
      </main>
    </div>
  </div>

  <div id="composeModal" class="modal hidden">
    <form id="composeForm" class="compose">
      <h2>New message</h2>

      <label>
        To
        <input name="to" type="email" required />
      </label>

      <label>
        Subject
        <input name="subject" type="text" required />
      </label>

      <label>
        Message
        <textarea name="html" rows="8" required></textarea>
      </label>

      <p id="composeError" class="error hidden"></p>

      <div class="actions">
        <button type="button" id="cancelBtn" class="btn-ghost">Cancel</button>
        <button type="submit" class="btn-accent">Send</button>
      </div>
    </form>
  </div>

  <script src="/app.js"></script>
</body>
</html>
