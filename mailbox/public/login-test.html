<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign in — Inbox (test)</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body class="login-body">
  <!-- Proton Pass detector bisection. Bare-minimum login form:
       no honeypot, no Turnstile, no name attrs. If Proton injects here,
       add elements back one at a time to find the trigger. -->
  <form id="loginForm" class="compose login-card">
    <h2>Sign in (test)</h2>

    <label for="username">
      Username
      <input id="username" type="text" autocomplete="username" required autofocus />
    </label>

    <label for="password">
      Password
      <input id="password" type="password" autocomplete="current-password" required />
    </label>

    <div class="actions">
      <button type="submit" class="btn-accent">Sign in</button>
    </div>
  </form>
</body>
</html>
