services:

  dough-back:
    build:
      context: ./system/backend
      dockerfile: Dockerfile
    container_name: dough-back
    ports:
      - "127.0.0.1:5000:5000"
    volumes:
      - "./dough-data:/app/dough-data"
      - "./.env:/app/.env:ro"
      - "./.env.keys:/app/.env.keys:ro"
    restart: unless-stopped

  dough-front:
    build:
      context: ./system/frontend
      dockerfile: Dockerfile
    container_name: dough-front
    environment:
      - NODE_ENV=production
    ports:
      - "127.0.0.1:5001:5001"
    volumes:
      - "./.env:/app/.env:ro"
      - "./.env.keys:/app/.env.keys:ro"
    depends_on:
      - dough-back

  inbox:
    build:
      context: ./mailbox
      dockerfile: Dockerfile
    ports:
      - "4040:4040"
    volumes:
      - "./.env:/app/.env:ro"
      - "./.env.keys:/app/.env.keys:ro"
      - "./mail-data:/app/data"
    restart: unless-stopped

volumes:
  backend_data:
  backend_avatars:
  
