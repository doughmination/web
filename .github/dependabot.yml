version: 2
updates:

  # ================================
  # CDN
  # ================================
  - package-ecosystem: "npm"
    directory: "/win/cdn"
    schedule:
      interval: "daily"
      time: "09:45"
    assignees:
      - "doughmination"
    groups:
        dependencies:
            applies-to: version-updates
            patterns:
                - "*"

  # ================================
  # Doughmination System Backend
  # ================================
  - package-ecosystem: "pip"
    directory: "/co/system/backend"
    schedule:
      interval: "daily"
      time: "09:45"
    assignees:
      - "doughmination"
    groups:
        dependencies:
            applies-to: version-updates
            patterns:
                - "*"

  # ================================
  # Doughmination System Frontend (React)
  # ================================
  - package-ecosystem: "npm"
    directory: "/co/system/frontend"
    schedule:
      interval: "daily"
      time: "09:45"
    assignees:
      - "doughmination"
    groups:
        dependencies:
            applies-to: version-updates
            patterns:
                - "*"

  # ================================
  # Company (React)
  # ================================
  - package-ecosystem: "npm"
    directory: "/win/root"
    schedule:
      interval: "daily"
      time: "09:45"
    assignees:
      - "doughmination"
    groups:
        dependencies:
            applies-to: version-updates
            patterns:
                - "*"
